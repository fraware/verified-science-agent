name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev,pdf,signing,api]"

      - name: Run full test suite
        run: bash scripts/acceptance.sh

      - name: Build release bundle
        run: |
          vsa export reports/brca1_report.json --out-dir reports/bundle --audit-mode rule
          vsa verify-bundle reports/bundle
          vsa attest reports/brca1_report.json --out reports/attestation.json --subject-name report.json
          cd reports/bundle && zip -r ../vsa-bundle.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            reports/brca1_report.json \
            reports/brca1_report.md \
            reports/audit.json \
            reports/attestation.json \
            reports/benchmark_summary.json \
            reports/vsa-bundle.zip \
            schemas/scientific_report.schema.json
