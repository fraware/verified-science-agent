name: Live connectors

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Live connector tests
        run: pytest tests/connectors/test_live.py -m live -v
